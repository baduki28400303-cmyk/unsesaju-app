<script>
const FAQS=[
  {q:'생년월일 입력 시 양력과 음력 중 무엇을 입력해야 하나요?',
   a:'사주의 원칙은 음력(陰曆)입니다. 하지만 현재 음력 생년월일을 정확히 모르시는 분이 많아, 양력으로 입력하시면 앱이 자동으로 음력으로 변환하여 사주를 분석합니다. 음력을 직접 입력하고 싶으시면 "음력 입력" 탭을 선택하시면 됩니다.'},
  {q:'운세 결과는 얼마나 정확한가요?',
   a:'운세사주는 동양 철학과 사주 이론을 바탕으로 한 풀이을 제공합니다. 수천 년의 동양 철학과 사주 이론을 바탕으로 분석하지만, 오락 및 참고 목적으로 이용하시기 바랍니다. 중요한 결정은 전문 사주 상담사와 상의하세요.'},
  {q:'생년월일 정보는 어디에 저장되나요?',
   a:'입력한 생년월일은 오직 사용자의 기기(스마트폰)에만 저장됩니다. 외부 서버로 전송되거나 제3자에게 공유되지 않습니다. 앱을 삭제하면 모든 데이터가 삭제됩니다.'},
  {q:'구독료는 얼마이고 어떻게 결제되나요?',
   a:'월 3,000원이며 매월 자동으로 결제됩니다. 구글 플레이 인앱결제로 처리되어 휴대폰 요금에 자동이체되거나 카드로 결제할 수 있습니다. 해지하면 당월 말까지 이용 가능합니다.'},
  {q:'구독을 해지하려면 어떻게 하나요?',
   a:'구글 플레이스토어 → 프로필 아이콘 → 결제 및 구독 → 구독 관리에서 언제든지 해지할 수 있습니다. 해지 후에도 당월 말까지 모든 기능을 이용할 수 있습니다.'},
  {q:'출생 시간을 모르면 어떻게 하나요?',
   a:'출생 시간을 모르시는 경우 "모름"을 선택해주세요. 출생 시간 없이도 사주 분석이 가능합니다. 다만 시주(時柱)가 포함되지 않아 일부 분석의 정확도가 낮아질 수 있습니다.'},
  {q:'오늘의 운세는 매일 바뀌나요?',
   a:'네, 오늘의 운세는 일진(日辰)에 따라 매일 자동으로 갱신됩니다. 사용자의 생년월일과 결합하여 개인화된 운세를 제공합니다.'},
  {q:'토정비결이란 무엇인가요?',
   a:'토정비결은 조선시대 학자 이지함이 창시한 전통 점술로, 생년·월·일을 기반으로 지팡이를 던져 나오는 수의 조합으로 운세를 풀이하는 방법입니다. 매년 새해에 한 해 운세를 보는 전통 문화입니다.'},
  {q:'앱이 느리거나 오류가 발생할 때는?',
   a:'앱을 완전히 종료 후 재실행해주세요. 문제가 지속되면 bigdolphin4989@gmail.com으로 문의해주시면 신속히 처리해드리겠습니다.'},
  {q:'환불 정책이 어떻게 되나요?',
   a:'구글 플레이 구독의 경우 첫 결제 후 48시간 이내에 구글 플레이 고객센터를 통해 환불 요청이 가능합니다. 이후에는 구글 플레이 환불 정책에 따라 처리됩니다.'}
];

const list=document.getElementById('faq-list');

  <div class="faq-item" onclick="this.classList.toggle('open')">

    <div class="faq-a">A. ${f.a}</div>
  </div>`).join('');
