<style>
.user-tag{background:var(--primary-light);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.user-tag .av{width:44px;height:44px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;}
.user-tag .un{font-size:15px;font-weight:700;color:var(--text);}
.user-tag .ub{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* 사주팔자표 */
.saju-table{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}
.saju-table h3{font-size:15px;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pillar{background:var(--primary-light);border-radius:10px;padding:10px 6px;text-align:center;}
.pillar-name{font-size:11px;color:var(--text-muted);margin-bottom:6px;}
.pillar-stem{font-size:22px;font-weight:700;color:var(--primary);line-height:1;}
.pillar-branch{font-size:18px;font-weight:600;color:#5D3A1A;margin-top:4px;}
.pillar-kr{font-size:10px;color:var(--text-muted);margin-top:4px;}
.ohaeng-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.ohaeng-tag{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}

.score-row{display:flex;align-items:center;gap:14px;padding:14px;background:var(--primary-light);border-radius:12px;margin-bottom:14px;border:1px solid var(--border);}
.sc-circle{width:74px;height:74px;border-radius:50%;background:#fff;border:3px solid var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.sc-num{font-size:24px;font-weight:700;color:var(--primary);line-height:1;}
.sc-unit{font-size:10px;color:var(--primary);}

.rc{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.rc h3{font-size:15px;color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.rc p{font-size:14px;line-height:1.9;color:var(--text);}

.lucky-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.li{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;}
.licon{font-size:18px;margin-bottom:3px;}
.ll{font-size:10px;color:#999;}
.lv{font-size:12px;font-weight:600;color:var(--text);margin-top:2px;}

.lock-wrap{position:relative;margin-bottom:14px;border-radius:14px;overflow:hidden;}
.lock-blur{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;filter:blur(5px);user-select:none;pointer-events:none;max-height:110px;overflow:hidden;}
.lock-blur p{font-size:14px;line-height:1.9;color:var(--text);}
.lock-over{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(253,248,245,.9);padding:20px;text-align:center;border-radius:14px;}
.lock-over h4{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
.lock-over p{font-size:13px;color:var(--text-light);line-height:1.6;margin-bottom:14px;}
.sbtn{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;}
.snote{font-size:11px;color:var(--text-muted);margin-top:7px;}

.ldbox{text-align:center;padding:48px 20px;background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:14px;}
.ldbox i{font-size:40px;color:var(--primary);animation:spin 1s linear infinite;}
.ldbox p{margin-top:12px;color:var(--text-muted);font-size:14px;}
.ldbox small{display:block;margin-top:6px;color:#bbb;font-size:12px;}

/* MBTI 사주 카드 */
.compat-saju{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;}

const CATNAMES = {destiny:'운명/전체운세',wealth:'재물운',love:'애정운',health:'건강운',career:'직업운/사업운',bigluck:'대운시기/10년운세'};

const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ZODIACS = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
const STEM_KR = ['갑','을','병','정','무','기','경','신','임','계'];
const BRANCH_KR = ['자','축','인','묘','진','사','오','미','신','유','술','해'];

// 사주 계산
function calcSaju(year, month, day, hour) {
  const yIdx = ((year - 4) % 10 + 10) % 10;
  const ybIdx = ((year - 4) % 12 + 12) % 12;
  // 월주 (간략 계산)
  const mIdx = ((year * 12 + month + 3) % 10 + 10) % 10;
  const mbIdx = ((month + 1) % 12);
  // 일주
  const base = new Date(2000, 0, 7);
  const diff = Math.floor((new Date(year, month-1, day) - base) / 86400000);
  const dIdx = ((diff % 10) + 10) % 10;
  const dbIdx = ((diff % 12) + 12) % 12;
  // 시주
  const hIdx = hour === -1 ? -1 : ((dIdx * 2 + Math.floor(hour / 2)) % 10 + 10) % 10;
  const hbIdx = hour === -1 ? -1 : (Math.floor((hour + 1) / 2) % 12);

  return {
    year:  { stem: STEMS[yIdx],  branch: BRANCHES[ybIdx], stemKr: STEM_KR[yIdx],  branchKr: BRANCH_KR[ybIdx], ohaeng: OHAENG[yIdx],  color: OHAENG_COLOR[yIdx]  },
    month: { stem: STEMS[mIdx],  branch: BRANCHES[mbIdx], stemKr: STEM_KR[mIdx],  branchKr: BRANCH_KR[mbIdx], ohaeng: OHAENG[mIdx],  color: OHAENG_COLOR[mIdx]  },
    day:   { stem: STEMS[dIdx],  branch: BRANCHES[dbIdx], stemKr: STEM_KR[dIdx],  branchKr: BRANCH_KR[dbIdx], ohaeng: OHAENG[dIdx],  color: OHAENG_COLOR[dIdx]  },
    hour:  hIdx === -1 ? null : { stem: STEMS[hIdx], branch: BRANCHES[hbIdx], stemKr: STEM_KR[hIdx], branchKr: BRANCH_KR[hbIdx], ohaeng: OHAENG[hIdx], color: OHAENG_COLOR[hIdx] }
  };
}

// 사주팔자표 HTML 생성
function renderSajuTable(saju, name) {
  const pillars = [
    { label: '시주(時)', data: saju.hour, empty: saju.hour === null },
    { label: '일주(日)', data: saju.day },
    { label: '월주(月)', data: saju.month },
    { label: '연주(年)', data: saju.year }
  ];
  return `
    <div class="saju-table">
      <h3><i class="fas fa-table"></i> ${name}님의 사주팔자</h3>
      <div class="pillars">
        ${pillars.map(pl => pl.empty ? `
          <div class="pillar" style="opacity:.4;">
            <div class="pillar-name">${pl.label}</div>
            <div class="pillar-stem" style="font-size:16px;">?</div>
            <div class="pillar-branch">?</div>
            <div class="pillar-kr">시간 모름</div>
          </div>` : `
          <div class="pillar">
            <div class="pillar-name">${pl.label}</div>
            <div class="pillar-stem" style="color:${pl.data.color}">${pl.data.stem}</div>
            <div class="pillar-branch">${pl.data.branch}</div>
            <div class="pillar-kr">${pl.data.stemKr}${pl.data.branchKr}</div>
          </div>`).join('')}
      </div>
      <div class="ohaeng-row">
        ${[saju.year, saju.month, saju.day, saju.hour].filter(Boolean).map(p =>
          `<span class="ohaeng-tag" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44;">${p.ohaeng}(${p.stemKr})</span>`
        ).join('')}
      </div>
    </div>`;
}

// 기본 운세 데이터
const BASE = {
  destiny:{score:82,summary:'변화와 성장의 기운이 강한 사주',p1:'강한 의지력과 실행력을 지닌 사주로 한번 마음먹은 일은 반드시 이루는 기질이 있습니다. 2026년 병오년은 전반적으로 길한 기운이 흐르며 오랫동안 준비해온 일들이 결실을 맺기 시작하는 시기입니다. 봄에는 귀인을 만날 기운이 강하니 새로운 만남을 적극적으로 맞이하세요.',p2:'상반기(1~6월)에는 새로운 인연과 기회가 찾아옵니다. 특히 3월과 5월이 가장 길한 시기로 중요한 결정은 이 시기에 맞추는 것이 유리합니다. 하반기(7~12월)에는 노력의 결실이 눈에 보이는 결과로 나타납니다. 9월에 귀인을 만날 가능성이 높으며 10~11월은 직업적으로 중요한 변화가 일어날 수 있습니다.',adv:'오전에 중요한 일을 처리하세요. 충동적인 결정은 삼가고 신중하게 행동하면 좋은 결과를 얻습니다.',lc:'빨간색',ln:'3, 9',ld:'남쪽',lf:'나물류'},
  wealth:{score:74,summary:'꾸준한 노력으로 재물이 쌓이는 해',p1:'재물운은 큰 기복 없이 꾸준하게 흐르는 흐름입니다. 갑작스러운 횡재보다는 성실한 노력으로 조금씩 쌓아가는 스타일로 장기적으로 안정적인 재물을 모을 수 있습니다.',p2:'상반기 3~5월 사이에 예상치 못한 수입이 들어올 가능성이 있습니다. 하반기에는 부동산이나 저축에 관심을 가져볼 만합니다. 충동적인 투자는 삼가고 안전한 상품 위주로 재테크를 시작하면 연말에 좋은 성과를 볼 수 있습니다.',adv:'충동 지출을 삼가세요. 소규모 저축부터 차근차근 시작하면 연말에 좋은 결과를 볼 수 있습니다.',lc:'노란색',ln:'2, 8',ld:'북쪽',lf:'두부류'},
  love:{score:78,summary:'따뜻한 인연이 찾아오는 시기',p1:'애정운이 활발하게 움직이는 시기입니다. 타인을 배려하는 따뜻한 마음씨가 좋은 인연을 끌어당기는 원동력이 됩니다. 2026년 봄에 특별한 만남의 기운이 있습니다.',p2:'상반기 3~5월에 새로운 인연이 생길 확률이 매우 높습니다. 소개팅이나 모임에 적극 참여하세요. 하반기에는 연인이 있으신 분은 관계가 한 단계 더 발전할 수 있는 기회가 옵니다.',adv:'소개팅이나 모임에 적극 참여하세요. 솔직한 감정 표현이 관계 발전의 열쇠입니다.',lc:'분홍색',ln:'4, 9',ld:'동쪽',lf:'딸기류'},
  health:{score:88,summary:'활력이 넘치는 건강한 사주',p1:'건강운이 매우 좋은 편입니다. 기초 체력이 강하고 회복력이 빠른 사주로 꾸준한 운동 습관만 들인다면 건강하게 지낼 수 있습니다.',p2:'상반기 봄철 환절기(3~4월) 호흡기 건강에 주의가 필요합니다. 하반기에는 에너지가 최고조에 달합니다. 여름에는 충분한 수분을 섭취하고 가을부터는 규칙적인 운동을 시작하면 체력이 크게 향상됩니다.',adv:'봄철 환절기 건강에 주의하세요. 규칙적인 수면과 충분한 수분 섭취가 건강의 기본입니다.',lc:'초록색',ln:'1, 6',ld:'동쪽',lf:'채소류'},
  career:{score:80,summary:'능력을 인정받는 직업운 상승',p1:'직업운이 상승하고 있는 시기입니다. 그동안 묵묵히 쌓아온 실력이 빛을 발하기 시작하며 주변에서 능력을 인정받는 기회가 찾아옵니다.',p2:'상반기 4월에 이직이나 승진의 기회가 올 수 있습니다. 하반기에는 팀 프로젝트나 협업에서 리더십을 발휘할 기회가 생깁니다. 전문성을 높이는 자격증 취득이나 공부를 시작하면 내년에 큰 도움이 됩니다.',adv:'인맥 관리에 신경 쓰세요. 전문성을 높이는 꾸준한 노력이 직업운 상승의 열쇠입니다.',lc:'파란색',ln:'5, 0',ld:'서쪽',lf:'견과류'},
  bigluck:{score:85,summary:'10년 대운 상승기',p1:'현재 대운(大運)의 흐름이 매우 좋습니다. 지금 시기는 인생의 중요한 전환점으로 새로운 도전을 시작하기에 최적의 시기입니다.',p2:'향후 10년간 재물운과 명예운이 함께 상승합니다. 처음 3년은 새로운 기회가 집중적으로 찾아오는 시기로 이 기회를 놓치지 않도록 준비를 철저히 해두세요.',adv:'큰 결정은 신중하게 하되 두려워하지 마세요. 주변의 귀인을 잘 활용하고 건강을 최우선으로 하세요.',lc:'금색',ln:'8, 9',ld:'남동쪽',lf:'한우'},
};

// XMLHttpRequest로 Gemini 호출
function callGemini(prompt, onSuccess, onFail) {
  const xhr = new XMLHttpRequest();
  xhr.open('POST',
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_API_KEY,
    true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 25000;
  xhr.ontimeout = onFail;
  xhr.onerror = onFail;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        const d = JSON.parse(xhr.responseText);
        const raw = (d.candidates?.[0]?.content?.parts?.[0]?.text || '')
          .replace(/```json|```/gi, '').trim();
        const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
        onSuccess(JSON.parse(raw.slice(s, e+1)));
      } catch(e) { onFail(); }
    } else { onFail(); }
  };
  xhr.send(JSON.stringify({
    contents: [{parts: [{text: prompt}]}],
    generationConfig: {temperature: 0.8, maxOutputTokens: 2048}
  }));
}

// 프로필 없으면 입력 유도

function startFortune() {
  const isPro = checkPremium();
  const name = p.name || '사용자';
  const yp = { stem: STEMS[((p.year-4)%10+10)%10], branch: BRANCHES[((p.year-4)%12+12)%12], animal: ZODIACS[((p.year-4)%12+12)%12] };
  const base = BASE[TYPE] || BASE.destiny;
  const saju = calcSaju(p.year, p.month, p.day, p.hour !== undefined ? p.hour : -1);

  // 사주표 + 로딩
  area.innerHTML =
    `<div class="user-tag">
      <div class="av"><i class="fas fa-user" style="font-size:20px;"></i></div>
      <div><div class="un">${name}님의 ${TITLES[TYPE]}</div>
      <div class="ub">음력 ${p.year}년 ${p.month}월 ${p.day}일 · ${yp.animal}띠 · 2026년 기준</div></div>
    </div>` +
    renderSajuTable(saju, name) +
    `<div class="ldbox" id="loading-box">
      <i class="fas fa-yin-yang"></i>
      <p>${name}님의 사주를 사주를 풀이하고 있어요</p>
      <small>잠시만 기다려 주세요...</small>
    </div>`;

  const prompt = `당신은 30년 경력 전문 사주 해설가입니다.
[사주 정보]
- 이름: ${name}
- 음력 생년월일: ${p.year}년 ${p.month}월 ${p.day}일
- 출생시간: ${(p.hour===-1||p.hour==='-1')?'모름':p.hour+'시'}
- 성별: ${p.gender==='M'?'남성':'여성'}
- 분석분야: ${CATNAMES[TYPE]||'전체운세'}
- 기준연도: 2026년

반드시 아래 JSON 형식만 출력하세요 (백틱 마크다운 절대 금지):
{"score":82,"summary":"한줄요약20자이내","preview":"${name}님 이름포함 무료미리보기150자","detail1":"상반기상세운세300자이상","detail2":"하반기상세운세300자이상","advice":"조언및주의사항100자","lucky_color":"색상","lucky_number":"숫자두개","lucky_direction":"방위","lucky_food":"음식"}`;

  callGemini(prompt,
    function(data) { showResult(data, saju, name, yp, isPro, base); },
    function() { showResult(null, saju, name, yp, isPro, base); }
  );
}

function showResult(data, saju, name, yp, isPro, base) {
  const score = data?.score || base.score;
  const summary = data?.summary || base.summary;
  const preview = data?.preview || base.p1;
  const detail1 = data?.detail1 || base.p2;
  const detail2 = data?.detail2 || '';
  const advice = data?.advice || base.adv;
  const lc = data?.lucky_color || base.lc;
  const ln = data?.lucky_number || base.ln;
  const ld = data?.lucky_direction || base.ld;
  const lf = data?.lucky_food || base.lf;

  let html =
    `<div class="user-tag">
      <div class="av"><i class="fas fa-user" style="font-size:20px;"></i></div>
      <div><div class="un">${name}님의 ${TITLES[TYPE]}</div>
      <div class="ub">음력 ${p.year}년 ${p.month}월 ${p.day}일 · ${yp.animal}띠 · 2026년 기준</div></div>
    </div>` +
    renderSajuTable(saju, name) +
    `<div class="score-row">
      <div class="sc-circle"><div class="sc-num">${score}</div><div class="sc-unit">점</div></div>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:4px;">${summary}</div>
        <div style="font-size:13px;color:var(--text);line-height:1.6;">${name}님의 2026년 ${TITLES[TYPE]}을 풀이했습니다.</div>
      </div>
    </div>
    <div class="rc"><h3><i class="fas fa-star"></i> ${name}님의 ${TITLES[TYPE]} 분석</h3><p>${preview}</p></div>
    <div class="lucky-grid">
      <div class="li"><div class="licon">🎨</div><div class="ll">행운 색</div><div class="lv">${lc}</div></div>
      <div class="li"><div class="licon">🔢</div><div class="ll">행운 숫자</div><div class="lv">${ln}</div></div>
      <div class="li"><div class="licon">🧭</div><div class="ll">행운 방위</div><div class="lv">${ld}</div></div>
      <div class="li"><div class="licon">🌿</div><div class="ll">행운 음식</div><div class="lv">${lf}</div></div>
    </div>`;

  if (isPro) {
    html += `<div class="rc"><h3><i class="fas fa-book-open"></i> 상반기 상세 운세 (1~6월)</h3><p>${detail1}</p></div>`;
    if (detail2) html += `<div class="rc"><h3><i class="fas fa-book-open"></i> 하반기 상세 운세 (7~12월)</h3><p>${detail2}</p></div>`;
    html += `<div class="rc"><h3><i class="fas fa-lightbulb"></i> 조언 및 주의사항</h3><p>${advice}</p></div>`;
  } else {
    html += `<div class="lock-wrap">
      <div class="lock-blur"><p>${detail1}</p></div>
      <div class="lock-over">
        <div style="font-size:30px;margin-bottom:8px;">🔒</div>
        <h4>${name}님, 상세 운세가 궁금하시죠?</h4>
        <p>상반기·하반기 상세 분석,<br>월별 운세, 주의사항까지<br>모두 확인하세요</p>
        <button onclick="location.href='premium.html'" class="sbtn">월 3,000원으로 전체 보기</button>
        <div class="snote">📱 자동이체 · 언제든 해지 가능</div>
      </div>
    </div>`;
  }

  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">
    <a href="../index.html" class="btn-outline" style="display:block;text-align:center;text-decoration:none;padding:13px;">← 다른 운세</a>
    <button onclick="location.reload()" class="btn-primary" style="padding:13px;"><i class="fas fa-redo"></i> 다시 분석</button>
  </div>`;

  area.innerHTML = html;
}

// ===== 토정비결 =====
let sticks = [], throwCnt = 0;
function renderTojeong() {
  const name = p ? p.name||'사용자' : '사용자';
  const saju = p ? calcSaju(p.year, p.month, p.day, p.hour||(-1)) : null;
  area.innerHTML =
    `<div class="user-tag"><div class="av">🎲</div>
    <div><div class="un">${name}님의 토정비결</div><div class="ub">지팡이를 6번 던져 운세를 확인하세요</div></div></div>` +
    (saju ? renderSajuTable(saju, name) : '') +
    `<div style="text-align:center;background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px;">
      <p style="font-size:14px;color:#6B4F3A;margin-bottom:16px;">지팡이를 던질 때마다 1~4개가 나옵니다</p>
      <div id="sd" style="display:flex;justify-content:center;gap:12px;margin:16px 0;min-height:80px;align-items:flex-end;"></div>
      <button id="tbtn" onclick="throwStick()" style="width:66px;height:66px;border-radius:50%;border:2px solid #C84B31;background:#fff;font-size:28px;cursor:pointer;">🎲</button>
      <p style="margin-top:10px;font-size:13px;color:#999;">던지기 <span id="tc">0</span>/6</p>
    </div>
    <div id="tr"></div>`;
}
function throwStick() {
  if (throwCnt >= 6) return;
  const n = Math.floor(Math.random()*4)+1;
  sticks.push(n); throwCnt++;
  document.getElementById('tc').textContent = throwCnt;
  document.getElementById('sd').innerHTML = sticks.map(n =>
    `<div style="text-align:center;"><div style="width:13px;height:${40+n*10}px;background:#C84B31;border-radius:6px;margin:0 auto 4px;"></div><div style="font-size:13px;font-weight:700;color:#C84B31;">${n}</div></div>`
  ).join('');
  if (throwCnt === 6) {
    document.getElementById('tbtn').disabled = true;
    document.getElementById('tbtn').style.opacity = '.4';
    const r = getTojeongResult(sticks);
    document.getElementById('tr').innerHTML =
      `<div style="text-align:center;background:#FFF0ED;border-radius:16px;padding:24px;margin-top:14px;border:1px solid var(--border);">
        <div style="font-size:42px;margin-bottom:8px;">${r.icon}</div>
        <div style="font-size:24px;font-weight:700;color:#C84B31;margin-bottom:10px;">${r.grade}</div>
        <div style="font-size:14px;color:#2C1810;line-height:1.8;">${r.msg}</div>
        <div style="margin-top:8px;font-size:13px;color:#999;">합계: ${sticks.reduce((a,b)=>a+b,0)}점</div>
      </div>
      <button onclick="sticks=[];throwCnt=0;renderTojeong();" class="btn-outline" style="margin-top:12px;">다시 던지기</button>`;
  }
}

// ===== MBTI 궁합 =====
const MBTI_DATA = {
  'ISTJ':{best:['ESTJ','ISFJ','INTJ'],good:['ISTP','ENTJ'],bad:['ENFP','ESFP'],desc:'신뢰할 수 있는 현실주의자'},
  'ISFJ':{best:['ISFJ','ISTJ','ESFJ'],good:['INFJ','ESTJ'],bad:['ENTP','ENTJ'],desc:'따뜻한 수호자'},
  'INFJ':{best:['ENFJ','INFP','INTJ'],good:['ISFJ','ENTP'],bad:['ESTP','ESFP'],desc:'선의의 옹호자'},
  'INTJ':{best:['INTJ','ENTJ','INFJ'],good:['ISTJ','ENTP'],bad:['ESFJ','ISFP'],desc:'용의주도한 전략가'},
  'ISTP':{best:['ESTP','ISTJ','INTP'],good:['ISFP','ENTP'],bad:['ENFJ','ESFJ'],desc:'만능 재주꾼'},
  'ISFP':{best:['ESFP','ISFJ','INFP'],good:['ISTP','ESFJ'],bad:['ENTJ','ESTJ'],desc:'호기심 많은 예술가'},
  'INFP':{best:['INFJ','ENFP','INTJ'],good:['ISFP','ENTP'],bad:['ESTJ','ESTP'],desc:'열정적인 중재자'},
  'INTP':{best:['ENTP','INTJ','INFP'],good:['ISTP','ENTJ'],bad:['ESFJ','ESTJ'],desc:'논리적인 사색가'},
  'ESTP':{best:['ISTP','ESTJ','ESFP'],good:['ENTP','ISFP'],bad:['INFJ','INFP'],desc:'에너지 넘치는 활동가'},
  'ESFP':{best:['ISFP','ESFJ','ESTP'],good:['ENFP','ISFJ'],bad:['INTJ','INFJ'],desc:'자유로운 영혼'},
  'ENFP':{best:['INFP','ENFJ','ENTP'],good:['ESFP','INFJ'],bad:['ISTJ','ISFJ'],desc:'열정적인 활동가'},
  'ENTP':{best:['ENTJ','INTP','ENFP'],good:['ESTP','INFJ'],bad:['ISFJ','ESFJ'],desc:'논쟁을 즐기는 변론가'},
  'ESTJ':{best:['ISTJ','ESTP','ESFJ'],good:['ENTJ','ISFJ'],bad:['INFP','ISFP'],desc:'엄격한 관리자'},
  'ESFJ':{best:['ISFJ','ESFP','ESTJ'],good:['ENFJ','ISFP'],bad:['INTP','INTJ'],desc:'사교적인 외교관'},
  'ENFJ':{best:['INFJ','ENFP','ESFJ'],good:['ENTJ','INFP'],bad:['ISTP','ESTP'],desc:'정의로운 사회운동가'},
  'ENTJ':{best:['INTJ','ENTP','ESTJ'],good:['ENFJ','INTP'],bad:['ISFP','INFP'],desc:'대담한 통솔자'}
};

function getMbtiCompat(t1, t2) {
  const d = MBTI_DATA[t1]; if (!d) return null;
  let score, grade, msg;
  if (d.best.includes(t2))      { score=95; grade='최고의 궁합 ❤️'; msg=`${t1}와 ${t2}는 천생연분! 서로의 장점을 극대화하는 최고의 조합입니다.`; }
  else if (d.good.includes(t2)) { score=80; grade='좋은 궁합 😊';   msg=`${t1}와 ${t2}는 서로 다른 매력을 느끼며 배울 점이 많은 관계입니다.`; }
  else if (d.bad.includes(t2))  { score=45; grade='어려운 궁합 💪'; msg=`${t1}와 ${t2}는 노력이 필요하지만 극복하면 좋은 시너지를 낼 수 있습니다.`; }
  else                           { score=65; grade='보통 궁합 🙂';   msg=`${t1}와 ${t2}는 큰 갈등 없이 무난하게 지낼 수 있는 조합입니다.`; }
  return { score, grade, msg, desc1: d.desc, desc2: MBTI_DATA[t2]?.desc||'' };
}

function renderMbti() {
  const name = p ? p.name||'사용자' : '사용자';
  const saju = p ? calcSaju(p.year, p.month, p.day, p.hour||(-1)) : null;
  const TYPES = ['ISTJ','ISFJ','INFJ','INTJ','ISTP','ISFP','INFP','INTP','ESTP','ESFP','ENFP','ENTP','ESTJ','ESFJ','ENFJ','ENTJ'];
  const opts = TYPES.map(t=>`<option value="${t}">${t}</option>`).join('');

  area.innerHTML =
    `<div class="user-tag"><div class="av">💕</div>
    <div><div class="un">${name}님의 MBTI 궁합</div><div class="ub">나의 MBTI와 상대방 MBTI를 선택하세요</div></div></div>` +
    (saju ? renderSajuTable(saju, name) : '') +
    `<div style="background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <label style="font-size:13px;font-weight:600;color:#2C1810;display:block;margin-bottom:6px;">나의 MBTI</label>
          <select id="t1" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;">
            <option value="">선택하세요</option>${opts}
          </select>
        </div>
        <div>
          <label style="font-size:13px;font-weight:600;color:#2C1810;display:block;margin-bottom:6px;">상대방 MBTI</label>
          <select id="t2" style="width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;">
            <option value="">선택하세요</option>${opts}
          </select>
        </div>
      </div>
      <button onclick="doMbti()" class="btn-primary" style="padding:14px;">💕 궁합 분석하기</button>
    </div>
    <div id="mr" style="margin-top:14px;"></div>`;
}

function doMbti() {
  const t1 = document.getElementById('t1').value;
  const t2 = document.getElementById('t2').value;
  if (!t1 || !t2) { alert('두 사람의 MBTI를 모두 선택해주세요.'); return; }
  const r = getMbtiCompat(t1, t2);
  if (!r) return;
  const isPro = checkPremium();
  const name = p ? p.name||'' : '';

  let html =
    `<div class="compat-saju">
      <h3><i class="fas fa-heart"></i> 궁합 분석 결과</h3>
      <div class="compat-grid">
        <div class="compat-person">
          <div class="cp-name">${name||'나'}</div>
          <div class="cp-mbti">${t1}</div>
          <div class="cp-desc">${r.desc1}</div>
        </div>
        <div class="compat-person">
          <div class="cp-name">상대방</div>
          <div class="cp-mbti">${t2}</div>
          <div class="cp-desc">${r.desc2}</div>
        </div>
      </div>
    </div>
    <div style="text-align:center;background:#FFF0ED;border-radius:16px;padding:24px;border:1px solid var(--border);margin-bottom:14px;">
      <div style="font-size:42px;font-weight:700;color:#C84B31;">${r.score}%</div>
      <div style="font-size:18px;font-weight:600;margin:8px 0;">${r.grade}</div>
      <div style="font-size:14px;color:#2C1810;line-height:1.8;">${r.msg}</div>
    </div>`;

  if (!isPro) {
    html +=
      `<div style="background:#fff;border:2px solid var(--primary);border-radius:16px;padding:20px;text-align:center;">
        <div style="font-size:26px;margin-bottom:8px;">🔒</div>
        <h4 style="font-size:15px;font-weight:700;color:#2C1810;margin-bottom:6px;">${name?name+'님, 더':'더'} 자세한 궁합이 궁금하시죠?</h4>
        <p style="font-size:13px;color:#6B4F3A;line-height:1.6;margin-bottom:14px;">
          의사소통 방식 · 갈등 해결법<br>장기 관계 전망까지 확인하세요
        </p>
        <button onclick="location.href='premium.html'" class="sbtn">월 3,000원 구독하기</button>
        <div class="snote">📱 자동이체 · 언제든 해지 가능</div>
      </div>`;
  }

  document.getElementById('mr').innerHTML = html;
}
</script>
