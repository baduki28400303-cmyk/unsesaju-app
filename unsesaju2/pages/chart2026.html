<script>
const STEMS10 = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES12 = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const HOLIDAYS = {'1/1':'신정','2/17':'설날','3/1':'삼일절','5/5':'어린이날','5/15':'부처님오신날','6/6':'현충일','8/15':'광복절','10/3':'개천절','10/9':'한글날','12/25':'크리스마스'};

const JUNGGI_2026 = {
  '1/5':'소한','1/20':'대한','2/3':'입춘','2/18':'우수',
  '3/5':'경칩','3/20':'춘분','4/4':'청명','4/20':'곡우',
  '5/5':'입하','5/21':'소만','6/6':'망종','6/21':'하지',
  '7/7':'소서','7/23':'대서','8/7':'입추','8/23':'처서',
  '9/7':'백로','9/23':'추분','10/8':'한로','10/23':'상강',
  '11/7':'입동','11/22':'소설','12/7':'대설','12/22':'동지'
};

function getDayPillarStr(y,m,d) {
  const base = new Date(2000,0,7);
  const diff = Math.floor((new Date(y,m-1,d)-base)/86400000);
  return STEMS10[((diff%10)+10)%10] + BRANCHES12[((diff%12)+12)%12];
}

function renderMonth(m) {
  const firstDay = new Date(2026, m-1, 1).getDay();
  const lastDate = new Date(2026, m, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear()===2026 && today.getMonth()+1===m;

  let html = `<div style="background:#fff;border:1px solid #EAD5CE;border-radius:14px;overflow:hidden;margin-bottom:16px;">`;
  html += `<div style="background:#C84B31;color:#fff;padding:12px 16px;font-size:16px;font-weight:700;">2026년 ${m}월</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#EAD5CE;">`;
  DAY_NAMES.forEach((d,i) => {
    const c = i===0?'#e53935':i===6?'#1565C0':'#666';
    html += `<div style="background:#FFF0ED;text-align:center;padding:6px 2px;font-size:11px;font-weight:600;color:${c};">${d}</div>`;
  });

  for (let i=0;i<firstDay;i++) html += `<div style="background:#f9f6f4;"></div>`;

  for (let d=1;d<=lastDate;d++) {
    const key = `${m}/${d}`;
    const isToday = isCurrentMonth && today.getDate()===d;
    const isHoliday = HOLIDAYS[key];
    const junggi = JUNGGI_2026[key];
    const dow = new Date(2026,m-1,d).getDay();
    const isWeekend = dow===0||dow===6;
    const dayPillar = getDayPillarStr(2026,m,d);

    let lunar = '';
    try { const l = solarToLunar(2026,m,d); lunar = l.day===1?`${l.month}월`:`${l.day}`; } catch(e) { lunar = d; }

    const bg = isToday ? '#C84B31' : '#fff';
    const solColor = isToday ? '#fff' : (isHoliday||dow===0) ? '#e53935' : dow===6 ? '#1565C0' : '#2C1810';
    const lunarColor = isToday ? 'rgba(255,255,255,.8)' : '#999';
    const pillarColor = isToday ? 'rgba(255,255,255,.9)' : '#C84B31';

    html += `<div style="background:${bg};padding:4px 2px;min-height:52px;text-align:center;border-top:1px solid #f0e8e4;">`;
    html += `<div style="font-size:14px;font-weight:${isToday?'700':'500'};color:${solColor};">${d}</div>`;
    html += `<div style="font-size:9px;color:${lunarColor};">${isHoliday||junggi?isHoliday||junggi:lunar}</div>`;
    html += `<div style="font-size:9px;color:${pillarColor};">${dayPillar}</div>`;
    html += `</div>`;
  }
  html += `</div></div>`;
  return html;
}

function showMonth(m) {
  document.querySelectorAll('[id^="month-"]').forEach(b => {
    b.style.background = '#fff'; b.style.color = '#6B4F3A'; b.style.borderColor = '#EAD5CE';
  });
  const active = document.getElementById(m===0?'month-all':`month-${m}`);
  if (active) { active.style.background='#C84B31'; active.style.color='#fff'; active.style.borderColor='#C84B31'; }

  const container = document.getElementById('calendar-container');
  if (m===0) {
    container.innerHTML = Array.from({length:12},(_,i)=>renderMonth(i+1)).join('');
  } else {
    container.innerHTML = renderMonth(m);
  }
}

const curMonth = new Date().getMonth()+1;
showMonth(curMonth <= 12 ? curMonth : 1);
</script>
